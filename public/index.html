<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica-Escola</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">



    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h1>Clínica Escola - Fatec</h1>
                <p>Acesso Administrativo</p>
            </div>

            <div id="login-form">
                <input type="email" id="email-input" placeholder="E-mail" required>
                <input type="password" id="password-input" placeholder="Senha" required>
                <button id="login-button">Entrar</button>
                <p id="error-message" class="error-message"></p>
            </div>

            <div style="margin-top: 1.5rem; text-align: center; padding-top: 1rem; border-top: 1px solid #e2e8f0;">
                <p style="margin-bottom: 0.8rem; color: #64748b; font-size: 0.9rem;">É estagiário e quer consultar sua agenda?</p>
                <a href="alunos.html" class="action-button" style="display: inline-block; width: 100%; text-align: center; background-color: #f8fafc; color: #4F76C9; border: 1px solid #cbd5e1; text-decoration: none; padding: 10px; border-radius: 4px; font-weight: 500; box-sizing: border-box;">
                    Área do Aluno
                </a>
            </div>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>


</body>

</html>
